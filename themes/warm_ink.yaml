# =============================================================
#  WARM INK (CLAUDE INSPIRED) THEME FOR HOME ASSISTANT
#  Based on the official Anthropic / Claude brand color palette
# =============================================================

Warm Ink:

  # -------------------------------------------------------------------
  # 1. BRAND PALETTE
  # -------------------------------------------------------------------

  # Core neutrals
  claude-ink:         "#141413"
  claude-charcoal:    "#3a3936"
  claude-stone:       "#6b6960"
  claude-sand:        "#b0aea5"
  claude-linen:       "#e8e6dc"
  claude-cream:       "#faf9f5"

  # Primary — terra cotta / orange scale
  claude-ember:       "#7a3520"
  claude-rust:        "#9e4a2e"
  claude-sienna:      "#b85e3d"
  claude-terra:       "#d97757"
  claude-clay:        "#e9a080"
  claude-blush:       "#f0c4b0"
  claude-petal:       "#faeee8"

  # Accent — blue scale
  claude-ocean:       "#3d6a94"
  claude-sky:         "#6a9bcc"
  claude-mist:        "#a8c7e8"
  claude-haze:        "#e0eef8"

  # Status — green scale (brand green + derived shades)
  claude-grove:       "#4a5c32"
  claude-fern:        "#788c5d"
  claude-sage:        "#a8bf8a"
  claude-dew:         "#e8f0dd"

  # Status — red (standard, kept for accessibility)
  claude-crimson:     "#c0392b"
  claude-rose:        "#e07070"
  claude-flush:       "#fdeaea"

  # RGB triplets for variables that need rgba() support
  claude-terra-rgb:   "217, 119, 87"
  claude-sky-rgb:     "106, 155, 204"
  claude-fern-rgb:    "120, 140, 93"
  claude-cream-rgb:   "250, 249, 245"
